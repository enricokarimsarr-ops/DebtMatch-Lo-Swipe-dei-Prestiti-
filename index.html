            --card-bg: #1a1a24;
            --card-back-bg: #15151e;
            --primary: #fd3a73;
            --success: #2ed573;
            --warning: #ffa502;
            --danger: #ff4757;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
            --accent: #00d2d3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .header-section {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        h1 { margin: 0 0 5px 0; color: var(--primary); font-size: 2.2rem; text-shadow: 0 0 10px rgba(253, 58, 115, 0.3); }
        p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }

        /* Dashboard Statistiche */
        #dashboard {
            width: 360px;
            background: rgba(25, 25, 35, 0.8);
            border: 1px solid #2f3542;
            border-radius: 14px;
            padding: 12px 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            font-weight: bold;
        }

        .stat-label { color: var(--text-muted); font-weight: normal; }
        #month-txt { color: var(--accent); }
        #active-loans-txt { color: var(--warning); }

        /* Barra Sovraindebitamento */
        .progress-container {
            width: 100%;
        }
        .progress-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .bar-bg {
            width: 100%;
            background: #2f3542;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid #3f4656;
        }
        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Notifiche Tipo Turno */
        #turn-badge {
            background: #2f3542;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .badge-normal { color: var(--text-muted); border: 1px solid #3f4656; }
        .badge-forced { color: #fff; background: var(--danger) !important; border: 1px solid var(--primary); animation: pulse 1.5s infinite; }

        /* CONTENITORE CARTE CON FLIP 3D */
        #game-container {
            position: relative;
            width: 340px;
            height: 420px;
            perspective: 1000px;
        }

        .card-perspective {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-perspective.flipped {
            transform: rotateY(180deg);
        }

        /* Facciate delle carte */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid #2f3542;
        }

        .card-front {
            background: var(--card-bg);
            background: linear-gradient(135deg, var(--card-bg) 0%, #222230 100%);
        }

        .card-back {
            background: var(--card-back-bg);
            background: linear-gradient(135deg, var(--card-back-bg) 0%, #101017 100%);
            transform: rotateY(180deg);
            border-color: var(--accent);
        }

        /* Elementi della carta */
        .card-header {
            text-align: center;
        }
        .card-title {
            color: var(--warning);
            margin: 0 0 8px 0;
            font-size: 1.35rem;
        }
        .card-amount {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: -1px;
        }
        .card-body {
            background: rgba(47, 53, 66, 0.6);
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .taeg-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--danger);
            margin-top: 8px;
            text-align: center;
        }
        .taeg-safe { color: var(--success); }

        .card-footer-tip {
            font-size: 0.8rem;
            color: #718093;
            text-align: center;
            font-style: italic;
        }

        /* Contenuto Retro Carta */
        .bank-info-title {
            color: var(--accent);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }
        .bank-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
        }
        .clause-box {
            background: rgba(253, 58, 115, 0.1);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            color: #f5f6fa;
            margin-top: 10px;
        }
        .clause-box.safe-bank {
            background: rgba(46, 213, 115, 0.1);
            border-left-color: var(--success);
        }

        /* Classi Animazione Swipe */
        .swipe-left-anim { transform: translate(-200%, 30px) rotate(-40deg) !important; opacity: 0; transition: all 0.4s ease; }
        .swipe-right-anim { transform: translate(200%, 30px) rotate(40deg) !important; opacity: 0; transition: all 0.4s ease; }

        /* Controlli di Interfaccia */
        .interaction-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            width: 340px;
        }

        .flip-btn {
            background: #2f3542;
            color: #fff;
            border: 1px solid #4f566d;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .flip-btn:hover { background: #3f4656; border-color: var(--accent); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 35px;
            width: 100%;
        }
        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:active { transform: scale(0.9); }
        #btn-reject { background: var(--danger); color: white; box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }
        #btn-accept { background: var(--success); color: white; box-shadow: 0 0 15px rgba(46, 213, 115, 0.3); }

        /* MODALE OVERLAY */
        #event-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 15, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        #event-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .event-modal {
            background: #1e1e2a;
            border: 2px solid var(--accent);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #event-overlay.active .event-modal {
            transform: scale(1);
        }

        .event-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }
        .event-title {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 0 12px 0;
        }
        .event-desc {
            font-size: 1rem;
            color: #f5f6fa;
            line-height: 1.6;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
        }
        .event-effect {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 22px;
        }
        .effect-bad { color: var(--danger); }
        .effect-good { color: var(--success); }

        .event-btn {
            background: linear-gradient(90deg, #00cec9, #00d2d3);
            color: #101015;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 211, 0.4);
            transition: transform 0.1s;
        }
        .event-btn:active { transform: scale(0.95); }
        
        .event-btn.exit-style {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        #news-feed {
            width: 340px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--accent);
            height: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>

        let avvisoFront = isForcedTurn ? 
            `<div style="font-size:0.85rem; color:#ff4757; font-weight:bold; margin-top:5px;">Scelta obbligatoria: valuta bene l'impatto distruttivo dello Squalo!</div>` : 
            `<div style="font-size:0.8rem; color:#718093;">Consiglio: Gira la carta per studiare chi emette il finanziamento!</div>`;

        frontEl.innerHTML = `
            <div class="card-header">
                <h3 class="card-title">${cartaCorrente.titolo}</h3>
                <div class="card-amount">${cartaCorrente.importo}</div>
            </div>
            <div class="card-body">
                ${cartaCorrente.dettagli}
                <div class="${taegClass}">TAEG: ${cartaCorrente.taeg}</div>
            </div>
            ${avvisoFront}
        `;

        // AGGIORNA IL RETRO DELLA CARTA
        const backEl = document.getElementById("card-back-el");
        const bankClass = (cartaCorrente.bancaTipo === "tradizionale") ? "clause-box safe-bank" : "clause-box";
        let iconaBanca = (cartaCorrente.bancaTipo === "tradizionale") ? "🏛️" : "🦈";

        backEl.innerHTML = `
            <div>
                <span class="bank-info-title">Istituto Emittente ${iconaBanca}</span>
                <div class="bank-name">${cartaCorrente.bancaNome}</div>
                <p style="font-size:0.9rem; color:var(--text-muted);">Profilo Rischio: <strong style="color:#ff9f43;">${cartaCorrente.bancaTipo.toUpperCase()}</strong></p>
            </div>
            <div class="${bankClass}">
                <strong>Clausole e Note:</strong><br>
                ${cartaCorrente.bancaClausola}
            </div>
            <div class="card-footer-tip">Usa i pulsanti grafici per decidere lo swipe</div>
        `;

        document.getElementById("month-txt").innerText = `Mese ${meseAttuale} / ${maxMesi}`;
        document.getElementById("active-loans-txt").innerText = prestitiAttivi.length;
        document.getElementById("debt-pct-txt").innerText = `${sovraindebitamento}%`;
        document.getElementById("debt-bar").style.width = `${Math.min(100, sovraindebitamento)}%`;
    }

    function toggleFlip() {
        const wrapper = document.getElementById("card-inner-wrapper");
        if (!eFlipped) {
            wrapper.classList.add("flipped");
            eFlipped = true;
        } else {
            wrapper.classList.remove("flipped");
            eFlipped = false;
        }
    }

    function handleSwipe(direzione) {
        if (inAnimazione) return;
        inAnimazione = true;

        const wrapper = document.getElementById("card-inner-wrapper");
        document.getElementById("news-feed").innerText = ""; 

        // GESTIONE NUOVO BIVIO DENTISTA
        if (cartaCorrente.tipoImpegno === "emergenza_bivio") {
            if (direzione === 'right') {
                wrapper.classList.add('swipe-right-anim');
                sovraindebitamento += 15;
                prestitiAttivi.push("dentista_banca");
                document.getElementById("news-feed").innerText = "Cura affrontata con Banca Solida! Tasso protetto (+15% Debito).";
            } else {
                wrapper.classList.add('swipe-left-anim');
                sovraindebitamento += 40;
                prestitiAttivi.push("dentista_squalo");
                document.getElementById("news-feed").innerText = "Infezione peggiorata! Ceduto alla Finanziaria Squalo in extremis (+40% Debito!).";
            }
            isForcedTurn = false;
        } else {
            // LOGICA TURNO ORDINARIO
            if (direzione === 'left') {
                wrapper.classList.add('swipe-left-anim');
                if (cartaCorrente.tipoImpegno === "voluttuario") {
                    // Capped a zero, non scende sotto
                    sovraindebitamento = Math.max(0, sovraindebitamento - 3);
                    document.getElementById("news-feed").innerText = "Ottimo! Risparmiato debito inutile.";
                }
            } else if (direzione === 'right') {
                wrapper.classList.add('swipe-right-anim');
                prestitiAttivi.push(cartaCorrente.id);

                if (cartaCorrente.tipoImpegno === "utile") {
                    sovraindebitamento += 12;
                } else if (cartaCorrente.tipoImpegno === "voluttuario") {
                    let moltiplicatore = (cartaCorrente.bancaTipo === "squalo" || cartaCorrente.bancaTipo === "aggressiva") ? 30 : 18;
                    sovraindebitamento += moltiplicatore;
                }
            }
        }

        setTimeout(() => {
            wrapper.className = "card-perspective"; 
            meseAttuale++; 
            inAnimazione = false;
            
            // Gli imprevisti scattano regolarmente a fine mese 3, 6, 9
            if ((meseAttuale - 1) % 3 === 0 && meseAttuale <= maxMesi) {
                eseguiImprevistoDinamico();
            } else {
                generaNuovaCarta();
            }
        }, 400);
    }

    // IMPREVISTI REATTIVI
    function eseguiImprevistoDinamico() {
        const haNotebook = prestitiAttivi.includes("pc_lavoro");
        const haMaster = prestitiAttivi.includes("corso_coding");
        const haSmartphoneTossico = prestitiAttivi.includes("smartphone_top");
        const haMonopattinoTossico = prestitiAttivi.includes("monopattino_mod");
        const haDentistaSqualo = prestitiAttivi.includes("dentista_squalo");

        let opzioniEvento = [];

        // Reazione se hai scelto lo Squalo per i denti al Mese 4
        if (haDentistaSqualo) {
            opzioniEvento.push({
                icon: "🦷",
                title: "INTERESSI USURAI SULL'EMERGENZA",
                desc: "La finanziaria rapida a cui hai chiesto l'urgenza medica ha applicato costi di mora per un ritardo tecnico bancario. Le rate sono andate fuori controllo.",
                effect: "EFFETTO: Gli strozzini picchiano duro! (+20% Sovraindebitamento)",
                action: () => {
                    sovraindebitamento += 20;
                    generaNuovaCarta();
                }
            });
        }

        if (haNotebook || haMaster) {
            opzioniEvento.push({
                icon: "🚀",
                title: "PROMOZIONE PROFESSIONALE!",
                desc: "Grazie alle competenze o agli strumenti professionali su cui hai investito, hai ottenuto un incremento istantaneo di entrate.",
                effect: "EFFETTO: Le maggiori entrate riducono la pressione! (-20% Sovraindebitamento)",
                action: () => {
                    sovraindebitamento = Math.max(0, sovraindebitamento - 20);
                    generaNuovaCarta();
                }
            });
        }

        if (haSmartphoneTossico || haMonopattinoTossico) {
            opzioniEvento.push({
                icon: "🦈",
                title: "CLAUSOLA CORROSIVA ATTIVATA",
                desc: "Le finanziarie aggressive dei tuoi vecchi sfizi hanno modificato unilateralmente i costi del contratto inserendo balzelli d'inflazione nascosti.",
                effect: "EFFETTO: Il costo reale del debito lievita! (+15% Sovraindebitamento)",
                action: () => {
                    sovraindebitamento += 15;
                    generaNuovaCarta();
                }
            });
        }

        opzioniEvento.push({
            icon: "🔧",
            title: "SPESA IDRAULICA IMPREVISTA",
            desc: "Un tubo del bagno ha deciso di rompersi. Riparazione immediata non rimandabile.",
            effect: "EFFETTO: Spesa d'urgenza sul groppone. (+10% Sovraindebitamento)",
            action: () => {
                sovraindebitamento += 10;
                generaNuovaCarta();
            }
        });

        let eventoSelezionato = opzioniEvento[0]; 
        if (opzioniEvento.length > 1 && Math.random() > 0.3) {
            eventoSelezionato = opzioniEvento[Math.floor(Math.random() * (opzioniEvento.length - 1))];
        }

        mostraImprevisto(eventoSelezionato.title, eventoSelezionato.desc, eventoSelezionato.effect, eventoSelezionato.title.includes("PROMOZIONE"), eventoSelezionato.action, false);
    }

    // GESTIONE DELLA FINESTRA MODALE E COMUNICAZIONE CON L'IFRAME DI GDEVELOP
    let callbackCorrenteModale = null;

    function mostraImprevisto(titolo, descrizione, effetto, isGood, onConfirm, isFinal = false) {
        document.getElementById("ev-title").innerText = titolo;
        document.getElementById("ev-desc").innerText = descrizione;
        document.getElementById("ev-effect").innerText = effetto;
        
        const effectEl = document.getElementById("ev-effect");
        const btnModale = document.querySelector(".event-btn");
        
        if (isGood) {
            effectEl.className = "event-effect effect-good";
            document.getElementById("ev-icon").innerText = "🎉";
        } else {
            effectEl.className = "event-effect effect-bad";
            document.getElementById("ev-icon").innerText = "🚨";
        }

        if (titolo.includes("VITTORIA")) document.getElementById("ev-icon").innerText = "👑";
        if (titolo.includes("OVER")) document.getElementById("ev-icon").innerText = "💀";

        // TASTO GRAFICO EMESSO PER LA CHIUSURA FINALE
        if (isFinal) {
            btnModale.innerText = "Chiudi e torna al gioco principale 🚪";
            btnModale.className = "event-btn exit-style";
            btnModale.setAttribute("onclick", "chiudiEInviaAGDevelop()");
        } else {
            btnModale.innerText = "Ho capito";
            btnModale.className = "event-btn";
            btnModale.setAttribute("onclick", "closeEventModal()");
            callbackCorrenteModale = onConfirm;
        }

        document.getElementById("event-overlay").classList.add("active");
    }

    function closeEventModal() {
        document.getElementById("event-overlay").classList.remove("active");
        if (callbackCorrenteModale) {
            callbackCorrenteModale();
        }
    }

    // Invia il messaggio postMessage a GDevelop per distruggere l'iframe in sicurezza
    function chiudiEInviaAGDevelop() {
        window.parent.postMessage("minigioco_finito", "*");
    }

    // AVVIO DEL MINIGIOCO
    generaNuovaCarta();
</script>

</body>
</html>
